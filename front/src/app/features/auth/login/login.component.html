<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.component.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="login-page">
      <div class="login-wrapper">
        <div class="brand">
          <div class="brand-logo">
            <img src="/logo.png" alt="RentEasy logo" class="brand-logo-img" />
          </div>
        </div>

        <div class="hero">
          <h1>Bienvenue sur RentEasy</h1>
          <p>Connectez-vous à votre compte</p>
        </div>

        <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <div class="form-group">
            <label for="username">Adresse e-mail</label>
            <input
              id="username"
              type="email"
              name="username"
              placeholder="vous@exemple.com"
              [(ngModel)]="username"
              required
              email
            />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>

            <div class="password-field">
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                placeholder="••••••••"
                [(ngModel)]="password"
                required
              />

              <button
                type="button"
                class="password-toggle"
                [attr.aria-label]="
                  showPassword
                    ? 'Masquer le mot de passe'
                    : 'Afficher le mot de passe'
                "
                (click)="togglePassword()"
              >
                <svg viewBox="0 0 24 24" class="eye-icon" aria-hidden="true">
                  <path
                    d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-row">
            <label class="remember-me">
              <input
                type="checkbox"
                name="rememberMe"
                [(ngModel)]="rememberMe"
              />
              <span>Se souvenir de moi</span>
            </label>

            <a routerLink="/forgot-password" class="forgot-link"
              >Mot de passe oublié ?</a
            >
          </div>

          <p class="error-message" style="display: none"></p>

          <button type="submit" class="login-button">Se connecter</button>

          <p class="signup-text">
            Vous n’avez pas encore de compte ?
            <a routerLink="/register" class="signup-link">S'inscrire</a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
