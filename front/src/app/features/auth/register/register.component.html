<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentEasy - Inscription</title>
    <meta
      name="description"
      content="Créez votre compte RentEasy pour gérer vos locations courte durée."
    />
    <link rel="stylesheet" href="register.component.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="register-page">
      <div class="register-wrapper">
        <div class="brand">
          <div class="brand-logo">
            <img src="/renteasy-logo.png" alt="RentEasy logo" class="brand-logo-img" />
          </div>
        </div>

        <div class="property-edit__toast-container" *ngIf="successMessage || errorMessage">
          <div class="property-edit__toast property-edit__toast--success" *ngIf="successMessage">
            <mat-icon fontIcon="check_circle"></mat-icon>
            <div>
              <p class="property-edit__toast-title">Inscription réussi</p>
              <p class="property-edit__toast-message">{{ successMessage }}</p>
            </div>
          </div>
          <div class="property-edit__toast property-edit__toast--error" *ngIf="errorMessage">
            <mat-icon fontIcon="error_outline"></mat-icon>
            <div>
              <p class="property-edit__toast-title">Erreur lors de l'inscription</p>
              <p class="property-edit__toast-message">{{ errorMessage }}</p>
            </div>
          </div>
        </div>

        <div class="hero">
          <h1>Bienvenue sur RentEasy</h1>
          <p>Creez votre compte</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="register-form" #registerForm="ngForm">
          <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input
              id="username"
              type="text"
              name="username"
              placeholder="Votre identifiant"
              [(ngModel)]="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="vous@exemple.com"
              [(ngModel)]="email"
              required
              email
            />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="password-field">
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                placeholder="********"
                [(ngModel)]="password"
                required
              />

              <button
                type="button"
                class="password-toggle"
                [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
                (click)="togglePassword()"
              >
                <svg viewBox="0 0 24 24" class="eye-icon" aria-hidden="true">
                  <path
                    d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmer le mot de passe</label>
            <div class="password-field">
              <input
                id="confirmPassword"
                [type]="showConfirmPassword ? 'text' : 'password'"
                name="confirmPassword"
                placeholder="********"
                [(ngModel)]="confirmPassword"
                required
              />

              <button
                type="button"
                class="password-toggle"
                [attr.aria-label]="showConfirmPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
                (click)="toggleConfirmPassword()"
              >
                <svg viewBox="0 0 24 24" class="eye-icon" aria-hidden="true">
                  <path
                    d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-row terms-row">
            <label class="remember-me">
              <input type="checkbox" name="acceptTerms" [(ngModel)]="acceptTerms" required />
              <span>J'accepte les conditions d'utilisation</span>
            </label>
          </div>

          <p class="error-message" *ngIf="error">{{ error }}</p>

          <button type="submit" class="register-button">S'inscrire</button>

          <p class="signup-text">
            Vous avez deja un compte ?
            <a routerLink="/login" class="signup-link">Se connecter</a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
