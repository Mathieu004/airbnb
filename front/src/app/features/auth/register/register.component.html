<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentEasy - Inscription</title>
    <meta
      name="description"
      content="Créez votre compte RentEasy pour gérer vos locations courte durée."
    />
    <link rel="stylesheet" href="register.component.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="register-page">
      <div class="register-wrapper">
        <div class="brand">
          <div class="brand-logo">
            <!-- Change only the src if your logo is stored in another folder -->
            <img src="/logo.png" alt="RentEasy logo" class="brand-logo-img" />
          </div>
        </div>

        <div class="hero">
          <h1>Bienvenue sur RentEasy</h1>
          <p>Créez votre compte</p>
        </div>

        
          <form class="register-form">
            <input
              type="hidden"
              id="selectedRole"
              name="role"
              value="administrateur"
            />

            <div class="form-group">
              <label for="firstName">Prénom</label>
              <input
                id="firstName"
                type="text"
                name="firstName"
                placeholder="Votre prénom"
                required
              />
            </div>

            <div class="form-group">
              <label for="lastName">Nom</label>
              <input
                id="lastName"
                type="text"
                name="lastName"
                placeholder="Votre nom"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input
                id="email"
                type="email"
                name="email"
                placeholder="vous@exemple.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Mot de passe</label>

              <div class="password-field">
                <input
                  id="password"
                  type="password"
                  name="password"
                  placeholder="••••••••"
                  required
                />

                <button
                  type="button"
                  class="password-toggle"
                  aria-label="Afficher le mot de passe"
                  onclick="togglePasswordVisibility('password', this)"
                >
                  <svg viewBox="0 0 24 24" class="eye-icon" aria-hidden="true">
                    <path
                      d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.9"
                      stroke-linejoin="round"
                    />
                    <circle
                      cx="12"
                      cy="12"
                      r="3"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.9"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirmer le mot de passe</label>

              <div class="password-field">
                <input
                  id="confirmPassword"
                  type="password"
                  name="confirmPassword"
                  placeholder="••••••••"
                  required
                />

                <button
                  type="button"
                  class="password-toggle"
                  aria-label="Afficher le mot de passe"
                  onclick="togglePasswordVisibility('confirmPassword', this)"
                >
                  <svg viewBox="0 0 24 24" class="eye-icon" aria-hidden="true">
                    <path
                      d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.9"
                      stroke-linejoin="round"
                    />
                    <circle
                      cx="12"
                      cy="12"
                      r="3"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.9"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-row terms-row">
              <label class="remember-me">
                <input type="checkbox" name="acceptTerms" required />
                <span>J’accepte les conditions d’utilisation</span>
              </label>
            </div>

            <p class="error-message" style="display: none"></p>

            <button type="submit" class="register-button">S’inscrire</button>

            <p class="signup-text">
              Vous avez déjà un compte ?
              <a href="/login" class="signup-link">Se connecter</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script>
      const roleButtons = document.querySelectorAll(".role-option");
      const selectedRoleInput = document.getElementById("selectedRole");

      roleButtons.forEach((button) => {
        button.addEventListener("click", () => {
          roleButtons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
          selectedRoleInput.value = button.dataset.role;
        });
      });

      function togglePasswordVisibility(inputId, button) {
        const input = document.getElementById(inputId);
        if (!input) return;

        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        button.setAttribute(
          "aria-label",
          isHidden ? "Masquer le mot de passe" : "Afficher le mot de passe",
        );
      }
    </script>
  </body>
</html>
