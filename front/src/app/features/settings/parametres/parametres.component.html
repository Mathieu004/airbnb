<div class="settings-container">
  <div class="settings-header">
    <h1>Param&egrave;tres</h1>
    <p class="settings-subtitle">G&eacute;rez votre profil et votre mot de passe</p>
  </div>

  <section class="settings-card">
    <div class="card-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <h2>Profil</h2>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Pr&eacute;nom</label>
        <input type="text" [(ngModel)]="firstName" placeholder="Pr&eacute;nom">
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" [(ngModel)]="lastName" placeholder="Nom">
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Email">
    </div>

    <p *ngIf="profileMessage" class="msg-success">{{ profileMessage }}</p>
    <p *ngIf="profileError" class="msg-error">{{ profileError }}</p>

    <button class="btn-primary" (click)="saveProfile()" [disabled]="savingProfile">
      {{ savingProfile ? 'Enregistrement...' : 'Enregistrer les modifications' }}
    </button>
  </section>

  <section class="settings-card">
    <div class="card-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <h2>Modifier le mot de passe</h2>
    </div>

    <div class="form-group">
      <label>Mot de passe actuel</label>
      <input type="password" [(ngModel)]="currentPassword" placeholder="********">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" [(ngModel)]="newPassword" placeholder="********">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" [(ngModel)]="confirmPassword" placeholder="********">
      </div>
    </div>

    <p *ngIf="passwordMessage" class="msg-success">{{ passwordMessage }}</p>
    <p *ngIf="passwordError" class="msg-error">{{ passwordError }}</p>

    <button class="btn-primary" (click)="changePassword()" [disabled]="savingPassword">
      {{ savingPassword ? 'Enregistrement...' : 'Modifier le mot de passe' }}
    </button>
  </section>
</div>
