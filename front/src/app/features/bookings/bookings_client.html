<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentEasy - Mes réservations</title>
  <link rel="stylesheet" href="bookings_client.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com/" />
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="client-bookings-page">
    <div class="client-bookings-container">
      <section class="page-header">
        <h1>Mes réservations</h1>
        <p>3 réservation(s)</p>
      </section>

      <section class="bookings-list">
        <article class="booking-card">
          <div class="booking-main">
            <div class="booking-details">
              <h2>Appartement Haussmannien</h2>

              <div class="booking-date">
                <svg viewBox="0 0 24 24" class="detail-icon" aria-hidden="true">
                  <rect x="4" y="5" width="16" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect>
                  <path d="M8 3v4M16 3v4M4 10h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                <span>2026-04-02 → 2026-04-06</span>
              </div>
            </div>

            <div class="booking-meta">
              <div class="travellers">
                <svg viewBox="0 0 24 24" class="detail-icon" aria-hidden="true">
                  <circle cx="9" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                  <circle cx="17" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                  <path d="M4 19a5 5 0 0 1 10 0M13 19a4 4 0 0 1 8 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                <span>2 voyageur(s)</span>
              </div>

              <span class="booking-status confirmed">Confirmée</span>

              <div class="booking-price">€740</div>

              <button type="button" class="message-button">
                <svg viewBox="0 0 24 24" class="message-icon" aria-hidden="true">
                  <path
                    d="M20 15a3 3 0 0 1-3 3H9l-5 3V6a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v9Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linejoin="round"
                  />
                </svg>
                <span>Message</span>
                <svg viewBox="0 0 24 24" class="chevron-icon" aria-hidden="true">
                  <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
            </div>
          </div>
        </article>

        <article class="booking-card">
          <div class="booking-main">
            <div class="booking-details">
              <h2>Appartement Haussmannien</h2>

              <div class="booking-date">
                <svg viewBox="0 0 24 24" class="detail-icon" aria-hidden="true">
                  <rect x="4" y="5" width="16" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect>
                  <path d="M8 3v4M16 3v4M4 10h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                <span>2026-04-10 → 2026-04-13</span>
              </div>
            </div>

            <div class="booking-meta">
              <div class="travellers">
                <svg viewBox="0 0 24 24" class="detail-icon" aria-hidden="true">
                  <circle cx="9" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                  <circle cx="17" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                  <path d="M4 19a5 5 0 0 1 10 0M13 19a4 4 0 0 1 8 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                <span>3 voyageur(s)</span>
              </div>

              <span class="booking-status confirmed">Confirmée</span>

              <div class="booking-price">€555</div>

              <button type="button" class="message-button">
                <svg viewBox="0 0 24 24" class="message-icon" aria-hidden="true">
                  <path
                    d="M20 15a3 3 0 0 1-3 3H9l-5 3V6a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v9Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linejoin="round"
                  />
                </svg>
                <span>Message</span>
                <svg viewBox="0 0 24 24" class="chevron-icon" aria-hidden="true">
                  <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
            </div>
          </div>
        </article>

        <article class="booking-card">
          <div class="booking-main">
            <div class="booking-details">
              <h2>Villa Méditerranée</h2>

              <div class="booking-date">
                <svg viewBox="0 0 24 24" class="detail-icon" aria-hidden="true">
                  <rect x="4" y="5" width="16" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect>
                  <path d="M8 3v4M16 3v4M4 10h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                <span>2026-04-15 → 2026-04-20</span>
              </div>
            </div>

            <div class="booking-meta">
              <div class="travellers">
                <svg viewBox="0 0 24 24" class="detail-icon" aria-hidden="true">
                  <circle cx="9" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                  <circle cx="17" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                  <path d="M4 19a5 5 0 0 1 10 0M13 19a4 4 0 0 1 8 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                <span>4 voyageur(s)</span>
              </div>

              <span class="booking-status cancelled">Annulée</span>

              <div class="booking-price">€1600</div>
            </div>
          </div>
        </article>
      </section>
    </div>
  </main>
</body>
</html>
